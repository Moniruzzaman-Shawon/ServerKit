<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="topline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#f97316" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Base background -->
  <rect width="800" height="200" rx="14" fill="#0d1117"/>

  <!-- Grid overlay -->
  <rect width="800" height="200" rx="14" fill="url(#grid)"/>

  <!-- Top center glow -->
  <rect width="800" height="100" rx="14" fill="url(#glow)"/>

  <!-- Border -->
  <rect width="800" height="200" rx="14" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="800" height="2" rx="1" fill="url(#topline)"/>

  <!-- Logo: Server (bold white) -->
  <text
    x="400" y="108"
    text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="94"
    font-weight="800"
    fill="#eef0f4"
    letter-spacing="-4"
  >Server<tspan font-weight="300" fill="#f97316" letter-spacing="-2">Kit</tspan></text>

  <!-- Tagline -->
  <text
    x="400" y="145"
    text-anchor="middle"
    font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="14"
    fill="#6e7681"
    letter-spacing="0.8"
  >Self-hosted Linux server management panel</text>

  <!-- Bottom meta row -->
  <circle cx="295" cy="172" r="4" fill="#56d364"/>
  <text x="307" y="177" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" fill="#56d364">v1.0.0</text>

  <circle cx="352" cy="173" r="1.5" fill="#6e7681"/>

  <text x="361" y="177" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" fill="#8b949e">MIT License</text>

  <circle cx="426" cy="173" r="1.5" fill="#6e7681"/>

  <text x="435" y="177" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" fill="#8b949e">Moniruzzaman Shawon</text>
</svg>
