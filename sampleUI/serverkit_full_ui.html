function genSpark(base=50,noise=20,n=20){
  return Array.from({length:n},(_,i)=>Math.max(0,Math.min(100,base+noise*(Math.sin(i*0.7)+Math.random()-0.5))));
}

function TerminalPage(){
  const [lines,setLines]=useState([
    {t:'banner',v:`ServerKit Web Terminal\r\nConnected to my-linux-server · Ubuntu 24.04 LTS\r\nType \x1b[33mhelp\x1b[0m for available commands\r\n`},
  ]);
  const [input,setInput]=useState('');
  const [hist,setHist]=useState([]);
  const [histIdx,setHistIdx]=useState(-1);
  const bottomRef=useRef(null);
  const inputRef=useRef(null);

  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:'smooth'});},[lines]);

  const CMDS={
    'help':()=>`Available commands:\n  ls, pwd, whoami, docker ps, df -h, free -h\n  htop (simulated), neofetch, uptime, clear\n  ping <host>, cat /etc/os-release`,
    'ls':()=>`\x1b[34mbin\x1b[0m  boot  dev  \x1b[34metc\x1b[0m  home  lib  \x1b[34mmedia\x1b[0m  \x1b[34mmnt\x1b[0m  opt  proc  root  run  sbin  srv  sys  tmp  usr  var`,
    'pwd':()=>'/root',
    'whoami':()=>'root',
    'uptime':()=>' 14:32:01 up 14 days,  3:21,  1 user,  load average: 0.23, 0.18, 0.15',
    'clear':()=>'__CLEAR__',
    'df -h':()=>`Filesystem      Size  Used Avail Use% Mounted on\n/dev/sda1       916G  180G  690G  21% /\n/dev/sdb1       1.9T  860G 1017G  46% /mnt/media\n/dev/sdb2       932G  210G  675G  24% /mnt/webserver`,
    'free -h':()=>`              total        used        free      shared  buff/cache   available\nMem:           16Gi       4.2Gi       8.1Gi       210Mi       3.7Gi        11Gi\nSwap:         2.0Gi          0B       2.0Gi`,
    'docker ps':()=>`CONTAINER ID   IMAGE              COMMAND     STATUS         PORTS                    NAMES\na1b2c3d4e5f6   traefik:v3.0       "/start"    Up 14 days     0.0.0.0:80->80/tcp       traefik\nd4e5f6g7h8i9   minio/minio        "/bin/sh"   Up 14 days     0.0.0.0:9000->9000/tcp   minio\ng7h8i9j0k1l2   postgres:16        "docker-e"  Up 14 days     127.0.0.1:5432->5432/tcp postgres\nj0k1l2m3n4o5   my-app:latest      "node ."    Up 2 days      0.0.0.0:4000->4000/tcp   my-nextjs-app`,
    'neofetch':()=>`\x1b[32m   ,--.   ,--.   \x1b[0m  \x1b[1mroot\x1b[0m@\x1b[1mmy-linux-server\x1b[0m\n\x1b[32m  /   '-'/   \\  \x1b[0m  ─────────────────────\n\x1b[32m  \\        /   \x1b[0m  OS: Ubuntu 24.04 LTS\n\x1b[32m   \\'----'/    \x1b[0m  Kernel: 6.8.0-31-generic\n\x1b[32m    \`----\`     \x1b[0m  Uptime: 14 days, 3 hours\n               Shell: bash 5.2.21\n               CPU: Intel Core i5-12400 (8)\n               RAM: 4234MiB / 16384MiB\n               Disk: 180G / 1.0T (18%)`,
    'htop':()=>`\x1b[7m  CPU[|||          23%]  Tasks: 142, 1 running\x1b[0m\n\x1b[7m  Mem[|||||        26%]  Load avg: 0.23 0.18 0.15\x1b[0m\n\x1b[7m  Swp[              0%]  Uptime: 14 days 03:21:04\x1b[0m\n\n  PID  USER   PRI  NI  VIRT   RES   CPU% MEM% Command\n 1234  root    20   0  512M  256M   0.8  1.6  postgres\n 2345  root    20   0  210M  180M   2.1  1.1  node server.js\n 3456  root    20   0  128M  128M   0.3  0.8  minio\n 4567  root    20   0   95M   95M   0.2  0.6  grafana\n 5678  root    20   0   52M   45M   0.1  0.3  traefik`,
    'cat /etc/os-release':()=>`NAME="Ubuntu"\nVERSION="24.04 LTS (Noble Numbat)"\nID=ubuntu\nID_LIKE=debian\nPRETTY_NAME="Ubuntu 24.04 LTS"\nHOME_URL="https://www.ubuntu.com/"`,
  };

  function run(cmd){
    const trimmed=cmd.trim();
    if(!trimmed)return;
    const fn=CMDS[trimmed]||(()=>`bash: ${trimmed.split(' ')[0]}: command not found`);
    const out=fn();
    if(out==='__CLEAR__'){setLines([]);return;}
    setLines(prev=>[...prev,{t:'cmd',v:trimmed},{t:'out',v:out}]);
    setHist(prev=>[trimmed,...prev.slice(0,49)]);
    setHistIdx(-1);
  }

  function onKey(e){
    if(e.key==='Enter'){run(input);setInput('');}
    else if(e.key==='ArrowUp'){e.preventDefault();const i=Math.min(histIdx+1,hist.length-1);setHistIdx(i);setInput(hist[i]||'');}
    else if(e.key==='ArrowDown'){e.preventDefault();const i=Math.max(histIdx-1,-1);setHistIdx(i);setInput(i===-1?'':hist[i]||'');}
  }

  function renderLine(text){
    return text.split('\n').map((line,i)=>h('div',{key:i,className:'term-line',dangerouslySetInnerHTML:{__html:line.replace(/\x1b\[(\d+)m/g,(m,code)=>{
      const map={'0':'</span>','1':'<span style="font-weight:600">','32':'<span style="color:#56d364">','33':'<span style="color:#d29922">','34':'<span style="color:#388bfd">','7':'<span style="background:#8b949e;color:#0d1117">'};
      return map[code]||'';
    })}||{__html:line}}));
  }

  return h('div',{className:'page',style:{padding:0}},
    h('div',{style:{padding:'16px 20px 12px',borderBottom:'1px solid var(--br)',display:'flex',alignItems:'center',justifyContent:'space-between'}},
      h('div',{style:{display:'flex',gap:8,alignItems:'center'}},
        h('div',{style:{width:10,height:10,borderRadius:'50%',background:C.red}}),
        h('div',{style:{width:10,height:10,borderRadius:'50%',background:C.amber}}),
        h('div',{style:{width:10,height:10,borderRadius:'50%',background:C.green}}),
        h('div',{style:{marginLeft:8,fontFamily:'var(--mono)',fontSize:12,color:C.tt}},'bash · my-linux-server')
      ),
      h('div',{style:{fontSize:11,color:C.tt,display:'flex',alignItems:'center',gap:6}},
        h('div',{style:{width:6,height:6,borderRadius:'50%',background:C.green}}),
        'connected · node-pty'
      )
    ),
    h('div',{className:'term-wrap',style:{borderRadius:0,height:500},onClick:()=>inputRef.current?.focus()},
      ...lines.map((l,i)=>
        l.t==='banner'?h('div',{key:i,className:'term-line',style:{color:C.ts,marginBottom:8}},l.v):
        l.t==='cmd'?h('div',{key:i,className:'term-input-row',style:{marginBottom:2}},
          h('span',{className:'term-user'},'root'),
          h('span',{style:{color:C.tt}},'@my-linux-server'),
          h('span',{style:{color:C.ts}},':~# '),
          h('span',{style:{color:C.tp}},l.v)
        ):
        h('div',{key:i,style:{marginBottom:6}},renderLine(l.v))
      ),
      h('div',{className:'term-input-row'},
        h('span',{className:'term-user'},'root'),
        h('span',{style:{color:C.tt}},'@my-linux-server'),
        h('span',{style:{color:C.ts}},':~# '),
        h('input',{ref:inputRef,className:'term-input',value:input,onInput:e=>setInput(e.target.value),onKeyDown:onKey,autoFocus:true,spellCheck:false})
      ),
      h('div',{ref:bottomRef})
    ),
    h('div',{style:{padding:'8px 16px',background:C.sf,borderTop:'1px solid var(--br)',fontSize:11,color:C.tt,display:'flex',gap:12}},
      ...['ls','df -h','docker ps','neofetch','help','clear'].map(cmd=>
        h('span',{key:cmd,style:{cursor:'pointer',fontFamily:'var(--mono)',color:C.ts,padding:'2px 6px',borderRadius:4,background:C.el},onClick:()=>{setInput(cmd);}},cmd)
      )
    )
  );
}

const PAGES={
  dashboard:{label:'Dashboard',icon:'dash',component:Dashboard},
  docker:{label:'Docker',icon:'docker',badge:'5',badgeClass:'green',component:DockerPage},
  media:{label:'Media server',icon:'media',component:MediaPage},

  db:{label:'Database',icon:'db',component:()=>h('div',{className:'page'},h('div',{style:{color:C.ts,fontSize:13,textAlign:'center',marginTop:40}},'Database module — coming in v1.0'))},
  storage:{label:'Storage',icon:'storage',component:StoragePage},
  network:{label:'Network',icon:'net',component:NetworkPage},

function AppShell({children,page,setPage}){
  return h('div',{style:{display:'flex',minHeight:720,width:'100%',overflow:'hidden',borderRadius:10,border:'1px solid var(--br)',boxShadow:'0 0 0 1px rgba(255,255,255,.04)'}},
    h('div',{className:'sidebar'},
      h('div',{className:'sb-logo'},
        h('div',{className:'sb-logo-mark'},'SK'),
        h('div',null,h('div',{className:'sb-logo-text'},'ServerKit'),h('div',{className:'sb-logo-sub'},'my-linux-server'))
      ),
      h('nav',{className:'sb-nav'},
        Object.entries(PAGES).map(([id,p])=>h('div',{key:id,className:'nav-item '+(page===id?'active':''),onClick:()=>setPage(id)},
          h(Icon,{n:p.icon,size:14}),
          p.label,
          p.badge&&h('span',{className:'nav-badge '+(p.badgeClass||'')},p.badge)
        )),
        h('div',{className:'sb-section'},'More'),
        ...['guides','settings'].map(id=>
          h('div',{key:id,className:'nav-item '+(page===id?'active':''),onClick:()=>setPage(id)},
            h(Icon,{n:id==='guides'?'guides':'settings',size:14}),
            id==='guides'?'Guides':'Settings'
          )
        )
      ),
      h('div',{className:'sb-footer'},
        h('div',{className:'sb-status'},h('div',{className:'pulse'}),h('span',null,'Online · v1.0.0'))
      )
    ),
    h('div',{className:'main'},
      h('div',{className:'topbar'},
        h('div',null,
          h('div',{className:'topbar-title'},(PAGES[page]||{label:page.charAt(0).toUpperCase()+page.slice(1)}).label),
        ),
        h('div',{className:'topbar-actions'},
          h('div',{style:{fontFamily:'var(--mono)',fontSize:11,color:C.tt,display:'flex',alignItems:'center',gap:6}},
            h('div',{style:{width:6,height:6,borderRadius:'50%',background:C.green,animation:'pulse 2s infinite'}}),
            'Ubuntu 24.04 · up 14d 3h'
          ),
          h('button',{className:'btn sm'},h(Icon,{n:'refresh',size:12}),' Refresh'),
        )
      ),
      h('div',{className:'content'},children)
    )
  );
}

function App(){
  const [logged,setLogged]=useState(false);
  const [page,setPage]=useState('dashboard');
  const PageComp=PAGES[page]?.component||(page==='guides'?GuidesPage:()=>h('div',{className:'page',style:{color:C.ts}},'Coming soon'));
  if(!logged)return h('div',{style:{display:'flex',minHeight:720,background:'var(--bg)',borderRadius:10,overflow:'hidden',border:'1px solid var(--br)'}},h(Login,{onLogin:()=>setLogged(true)}));
  return h(AppShell,{page,setPage},h(PageComp));
}

ReactDOM.render(h(App),document.getElementById('sk-root'));
</script>
