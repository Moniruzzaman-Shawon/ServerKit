worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    # Map Upgrade header for WebSocket proxying
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream serverkit {
        server serverkit:3000;
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Timeouts — keep WebSocket / terminal connections alive
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
        proxy_connect_timeout   10s;

        # Allow large media file uploads and streaming responses
        client_max_body_size 500m;

        # Compression for text assets
        gzip on;
        gzip_types text/plain text/css application/json application/javascript
                   text/xml application/xml image/svg+xml;
        gzip_min_length 1024;

        location / {
            proxy_pass         http://serverkit;
            proxy_http_version 1.1;

            # WebSocket upgrade (Socket.io stats + terminal)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Forward real client IP
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_cache_bypass $http_upgrade;

            # Disable buffering for SSE / streaming responses
            proxy_buffering off;
        }
    }
}
