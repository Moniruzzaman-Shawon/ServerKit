services:

  # ── Nginx — reverse proxy ──────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: serverkit-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - serverkit
    networks:
      - sk-net

  # ── ServerKit — main application ──────────────────────────────────────────
  serverkit:
    build: .
    container_name: serverkit-app
    restart: unless-stopped

    # Share the host PID namespace so that `ss -tlnp` reports
    # real host ports and process names on the Network page.
    pid: "host"

    networks:
      - sk-net
    volumes:
      # Docker management (sibling-container model)
      - /var/run/docker.sock:/var/run/docker.sock

      # Media browser roots (read-only — ServerKit never writes here)
      - /mnt/media:/mnt/media:ro
      - /mnt/webserver:/mnt/webserver:ro

      # Persistent data (SQLite: settings + activity log)
      - ./data:/app/data

      # Thermal monitoring — CPU temp via Linux sysfs (no root needed)
      # Optional: remove these three lines on cloud VMs / bare-metal installs without sensors
      - /sys/class/thermal:/sys/class/thermal:ro
      - /sys/class/hwmon:/sys/class/hwmon:ro
      - /sys/devices:/sys/devices:ro

      # Tailscale — optional; remove if Tailscale is not installed on this host
      - /var/run/tailscale:/var/run/tailscale
      - /usr/bin/tailscale:/usr/bin/tailscale:ro

    environment:
      - SK_PASSWORD=${SK_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - NEXT_PUBLIC_HOSTNAME=${NEXT_PUBLIC_HOSTNAME:-my-linux-server}
      - PORT=3000
      - MEDIA_ROOTS=${MEDIA_ROOTS:-/mnt/media,/mnt/webserver}
      - DOCKER_SOCKET=${DOCKER_SOCKET:-/var/run/docker.sock}
      # MinIO is on the same Docker network — use service name, not localhost
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-http://minio:9000}
      - MINIO_USER=${MINIO_USER:-minioadmin}
      - MINIO_PASS=${MINIO_PASS:-minioadmin}
      - NODE_ENV=production
      - COOKIE_SECURE=${COOKIE_SECURE:-false}

  # ── MinIO — S3-compatible object storage ──────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: serverkit-minio
    restart: unless-stopped
    networks:
      - sk-net
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_PASS:-minioadmin}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  sk-net:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  minio_data:
